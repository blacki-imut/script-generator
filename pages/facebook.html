<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Content Generator - Blacki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4140660607156269"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="facebook.style.css">
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Tombol Kembali -->
<div class="fixed top-4 left-4 z-50">

  <a href="index.html"
     style="font-family:'Poppins',sans-serif;"
     class="group flex items-center gap-3 px-5 py-3 rounded-2xl
            bg-black/40 backdrop-blur-2xl
            border border-white/10
            text-white font-semibold
            shadow-[0_8px_30px_rgba(0,0,0,0.35)]
            hover:bg-white/10
            hover:scale-105
            transition duration-300">

    <div class="w-9 h-9 rounded-xl
                bg-gradient-to-r from-pink-500 to-cyan-400
                flex items-center justify-center
                shadow-lg">

      <i class="fa-solid fa-arrow-left text-sm"></i>

    </div>

    <span class="tracking-wide">
      Kembali
    </span>

  </a>

</div>
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold mb-2"><i class="fab fa-facebook mr-2 fb-blue"></i>Facebook <span class="gradient-text">Content Generator</span></h1>
            <p class="text-slate-600">Buat Postingan Grup & Status Viral dalam hitungan detik!</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass-card p-6 rounded-2xl">
                <div class="flex mb-6 space-x-2 bg-slate-100 p-1 rounded-lg">
                    <button onclick="switchTab('ide')" id="tab-ide" class="flex-1 py-2 rounded-md bg-white shadow-sm fb-blue font-semibold">
                        <i class="fas fa-edit mr-2"></i>Status/Ide
                    </button>
                    <button onclick="switchTab('foto')" id="tab-foto" class="flex-1 py-2 rounded-md text-slate-500">
                        <i class="fas fa-image mr-2"></i>Foto Produk
                    </button>
                </div>

                <div id="input-section">
                    <div id="ide-input">
                        <label class="block text-sm font-semibold mb-2">Apa yang Anda pikirkan?</label>
                        <textarea id="prompt-text" rows="4" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm text-black" placeholder="Contoh: Jualan madu murni atau tips otomotif..."></textarea>
                    </div>

                    <div id="foto-input" class="hidden">
                        <label class="block text-sm font-semibold mb-2">Upload Foto Produk/Kegiatan</label>
                        <div class="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center cursor-pointer hover:border-blue-500 transition-colors" onclick="document.getElementById('file-upload').click()">
                            <i class="fas fa-images text-3xl mb-2 text-slate-400"></i>
                            <p class="text-sm text-slate-500">Klik untuk tambah foto</p>
                            <input type="file" id="file-upload" class="hidden" accept="image/*" onchange="handleFileUpload(event)">
                            <div id="preview-container" class="mt-4 hidden">
                                <img id="img-preview" class="h-32 mx-auto rounded-lg shadow-md border-2 border-white">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-6">
                    <label class="block text-sm font-semibold mb-2">Pilih Gaya Postingan</label>
                    <select id="style-select" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm text-black">
                        <option value="storytelling">Storytelling (Bercerita/Curhat)</option>
                        <option value="tips">Tips & Trik (Informatif)</option>
                        <option value="jualan">Hard Sell (Langsung Jualan)</option>
                        <option value="diskusi">Diskusi (Pancing Komentar)</option>
                        <option value="formal">Pengumuman (Resmi)</option>
                    </select>
                </div>

                <button onclick="generateScript()" class="w-full mt-8 py-3 rounded-xl btn-fb font-bold text-white shadow-lg uppercase tracking-wide">
                    BUAT POSTINGAN <i class="fas fa-paper-plane ml-2"></i>
                </button>
            </div>

            <div class="glass-card p-6 rounded-2xl flex flex-col">
                <div class="flex justify-between items-center mb-4 border-b pb-3">
                    <h2 class="font-bold text-lg text-slate-800"><i class="fas fa-align-left mr-2 fb-blue"></i>Draft Postingan</h2>
                    <button onclick="copyToClipboard()" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg font-bold transition-colors">
                        <i class="fas fa-copy mr-1"></i> SALIN TEKS
                    </button>
                </div>
                <div id="script-result" class="bg-slate-50 border border-slate-100 rounded-xl p-4 flex-grow overflow-y-auto text-sm leading-relaxed whitespace-pre-wrap text-slate-700">
                    Draft postingan Facebook Anda akan muncul di sini...
                </div>
            </div>
        </div>

        <div class="mt-12 mb-8">
            <h3 class="text-center text-slate-500 mb-6 text-sm uppercase tracking-widest font-bold">Support Kreator (Blacki)</h3>
            <div class="flex flex-wrap justify-center gap-4">
                <a href="https://youtube.com/@blacki-2?sub_confirmation=1" target="_blank" class="social-btn flex items-center bg-[#FF0000] px-6 py-3 rounded-full text-white font-bold shadow-md">
                    <i class="fab fa-youtube mr-2 text-xl"></i> YouTube
                </a>
                <a href="https://tiktok.com/@blackiimut2" target="_blank" class="social-btn flex items-center bg-black px-6 py-3 rounded-full text-white font-bold shadow-md">
                    <i class="fab fa-tiktok mr-2 text-xl"></i> TikTok
                </a>
                <a href="https://saweria.co/Blacki2" target="_blank" class="social-btn flex items-center bg-[#faae2b] px-6 py-3 rounded-full text-black font-bold shadow-md">
                    <i class="fas fa-donate mr-2 text-xl"></i> Saweria
                </a>
            </div>
        </div>

        <footer class="text-center text-slate-400 text-xs mt-10 pb-10">
            &copy; 2024 Built with ❤️ by Blacki Script Generator
        </footer>
    </div>

    <script src="facebook.script.js"></script>
</body>
</html>
